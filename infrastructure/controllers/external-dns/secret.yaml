apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-api-key
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  data:
  - secretKey: UNIFI_API_KEY
    remoteRef:
      key: eso/unifi-external-dns
      property: credential