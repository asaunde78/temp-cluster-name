apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: default
spec:
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
          app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami-service
  namespace: default
  annotations:
      external-dns.alpha.kubernetes.io/hostname: whoami.internal.zinkithink.com
spec:
  selector:
    app: whoami
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: local-issuer
spec:
  gatewayClassName: cilium
  listeners:
  - protocol: HTTP
    hostname: whoami.internal.zinkithink.com
    port: 80
    name: http
  - protocol: HTTPS
    hostname: whoami.internal.zinkithink.com
    port: 443
    name: https
    tls:
      mode: Terminate
      certifiateRefs:
      - kind: Secret 
        name: secret-tls-whoami-local
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-route
  namespace: default
spec:
  parentRefs:
  - name: gateway
    namespace: default
  hostnames:
    - whoami.internal.zinkithink.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: whoami-service
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-route-redirect
  namespace: whoami-local
spec:
  parentRefs:
  - name: gateway
    sectionName: http
    namespace: whoami-local
  hostnames:
  - whoami.internal.zinkithink.com
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
