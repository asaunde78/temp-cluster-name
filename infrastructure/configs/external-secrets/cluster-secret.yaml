apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.kube-system.svc.cluster.local:8200"
      path: "eso"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "cluster"
          role: "external-secrets"